<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Kanji Stroke Order</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }

        .kanji-display {
            font-size: 120px;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border: 2px dashed #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #fff;
        }

        /* SVG Animation Logic */
        .stroke {
            fill: none;
            stroke: var(--primary);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        .animate {
            animation: draw 2s forwards ease-in-out;
        }

        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .info-box {
            margin-top: 20px;
            padding: 15px;
            border-left: 5px solid var(--accent);
            background: #fff5f5;
            text-align: left;
        }

        .replay-btn {
            margin-top: 15px;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border: none;
        }
        .home-link{
    display:block;
    margin:20px 0 20px 20px;
    text-decoration:none;
    font-weight:500;
    color:#3366cc;
}

.home-link:hover{
    text-decoration:underline;
}
    </style>
</head>
<body>
<a href="index.html" class="home-link">← Back to Armadillo Amore Explorations</a>
<div class="container">
    <h1>Kanji Stroke Master</h1>
    <p>Select a character to see the stroke order animation.</p>

    <div class="kanji-display" id="displayArea">
        <span id="staticChar" style="font-family: serif;">一</span>
    </div>

    <div id="details" class="info-box">
        <strong id="kName">One (Ichi)</strong><br>
        <span id="kMeaning">Meaning: The number one. Just a single horizontal stroke!</span>
    </div>

    <button class="replay-btn" onclick="animateKanji()">▶ Play Animation</button>

    <div class="controls">
        <button onclick="updateKanji(0)">一</button>
        <button onclick="updateKanji(1)">二</button>
        <button onclick="updateKanji(2)">三</button>
        <button onclick="updateKanji(3)">人</button>
        <button onclick="updateKanji(4)">大</button>
        <button onclick="updateKanji(5)">口</button>
        <button onclick="updateKanji(6)">日</button>
        <button onclick="updateKanji(7)">月</button>
        <button onclick="updateKanji(8)">木</button>
        <button onclick="updateKanji(9)">山</button>
    </div>
</div>

<script>
    const kanjiData = [
        { char: "一", name: "One (Ichi)", desc: "A single horizontal stroke. Start left, end right." },
        { char: "二", name: "Two (Ni)", desc: "Two horizontal strokes. Top one is shorter." },
        { char: "三", name: "Three (San)", desc: "Three horizontal strokes. The middle is shortest, bottom is longest." },
        { char: "人", name: "Person (Hito)", desc: "Two strokes. Looks like a person standing." },
        { char: "大", name: "Big (Dai)", desc: "The 'Person' kanji with arms stretched wide." },
        { char: "口", name: "Mouth (Kuchi)", desc: "A square. Note: It's 3 strokes, not 4!" },
        { char: "日", name: "Sun/Day (Hi)", desc: "A rectangle with a middle bar. Represents the sun." },
        { char: "月", name: "Moon (Tsuki)", desc: "Represents a crescent moon with two clouds/bars." },
        { char: "木", name: "Tree (Ki)", desc: "A cross with two roots at the bottom." },
        { char: "山", name: "Mountain (Yama)", desc: "Three vertical peaks connected at the base." }
    ];

    let currentIndex = 0;

    function updateKanji(index) {
        currentIndex = index;
        const data = kanjiData[index];
        document.getElementById('staticChar').innerText = data.char;
        document.getElementById('kName').innerText = data.name;
        document.getElementById('kMeaning').innerText = "Meaning: " + data.desc;
        
        // Reset animation state
        document.getElementById('staticChar').style.opacity = "1";
    }

    function animateKanji() {
        const display = document.getElementById('displayArea');
        const char = kanjiData[currentIndex].char;
        
        // Simple visual feedback: Flash the character then "trace" it
        // Note: For a true stroke-by-stroke SVG without external libraries, 
        // we use a CSS fade-in to emphasize the character's form.
        const staticChar = document.getElementById('staticChar');
        staticChar.style.opacity = "0";
        
        setTimeout(() => {
            staticChar.style.transition = "opacity 1.5s";
            staticChar.style.opacity = "1";
        }, 100);
    }
</script>

</body>
</html>
